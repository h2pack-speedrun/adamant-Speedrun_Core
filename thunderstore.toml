[config]
schemaVersion = "0.0.1"


[package]
namespace = "adamant"
name = "Speedrun_Modpack"
versionNumber = "1.1.0"
description = "Speedrun modpack package."
websiteUrl = "https://github.com/h2pack-speedrun/adamant-Speedrun_Modpack"
containsNsfwContent = false

[package.dependencies]
Hell2Modding-Hell2Modding = "1.0.78"
LuaENVY-ENVY = "1.2.0"
SGG_Modding-Chalk = "2.1.1"
SGG_Modding-ReLoad = "1.0.2"
SGG_Modding-ModUtil = "4.0.1"
adamant-ModpackLib = "1.0.0"
adamant-ModpackFramework = "1.0.0"


# -- submodules-start --
adamant-Speedrun_Balance_Changes = "0.0.1"
adamant-Speedrun_Gameplay_QoL = "0.0.1"
adamant-Speedrun_LiveSplit = "1.1.2"
adamant-Speedrun_QoL = "1.1.0"
adamant-Speedrun_Select_First_Hammer = "1.1.0"
adamant-Speedrun_Surface_Rebalance = "0.0.1"
# -- submodules-end --

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"


[publish]
repository = "https://thunderstore.io"
communities = [ "hades-ii", ]

[publish.categories]
hades-ii = [ "mods", ]
